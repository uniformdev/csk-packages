# yaml-language-server: $schema=https://uniform.app/schemas/json-schema/component-definition/v1.json
$schema: https://uniform.app/schemas/json-schema/component-definition/v1.json
id: localeSelector
name: Locale Selector
icon: screen
parameters:
  - id: size
    name: Size
    type: dex-segmented-control-parameter
    typeConfig:
      options:
        - key: XS
          value: xs
        - key: SM
          value: sm
        - key: Base
          value: base
        - key: LG
          value: lg
        - key: XL
          value: xl
        - key: 2XL
          value: 2xl
        - key: 3XL
          value: 3xl
        - key: 4XL
          value: 4xl
        - key: 5XL
          value: 5xl
        - key: 6XL
          value: 6xl
        - key: 7XL
          value: 7xl
      defaultValue: {}
      withViewPort: true
  - id: color
    name: Color
    type: dex-color-palette-parameter
    typeConfig:
      allowColors:
        - text-primary
        - text-secondary
        - text-tertiary
        - text-dark
        - text-link
        - text-featured
      selectedGroup: text
      allowThemeColors: []
  - id: backgroundColor
    name: Background Color
    type: dex-color-palette-parameter
    typeConfig:
      allowColors:
        - general-color-1
        - general-color-6
        - general-color-7
        - general-color-8
        - general-color-11
        - general-color-12      
useTeamPermissions: true
slots: []
canBeComposition: false
created: '2025-06-19T08:31:48.417013+00:00'
updated: '2025-06-19T09:58:29.737117+00:00'
variants:
  - id: onlyIcons
    name: Only Icons
  - id: onlyCodes
    name: Only Codes
